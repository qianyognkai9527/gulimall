spring:
  datasource:
    url: jdbc:mysql://localhost:3306/gulimall-pms?useUnicode=true&characterEncoding=utf-8&useSSL=false&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&allowMultiQueries=true
    username: root
    password: root123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
    initial-size: 5
    min-idle: 5
    max-active: 20
    max-wait: 60000
    time-between-eviction-runs-millis: 60000
    min-evictable-idle-time-millis: 300000
    test-while-idle: true
    test-on-borrow: true
    test-on-return: false


mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.joker.gulimall.product.entity

  global-config:
    db-config:
        id-type: auto



